<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محمد الحُدَيدي | مطور مواقع</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .highlight {
            color: #667eea;
            font-size: 1.2em;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            line-height: 1.8;
            margin-bottom: 20px;
        }
        .btn {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            text-decoration: none;
            margin-top: 10px;
            transition: 0.3s;
        }
        .btn:hover {
            background: #764ba2;
            transform: scale(1.05);
        }
        .links {
            margin-top: 30px;
        }
        .links a {
            color: #667eea;
            text-decoration: none;
            margin: 0 10px;
        }
        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>محمد الحُدَيدي</h1>
        <div class="highlight">🚀 مطور مواقع | طالب برمجيات</div>
        <p>
            مرحباً بك في موقعي الشخصي! أنا شغوف بتطوير الويب وبناء تجارب رقمية مذهلة.
            هذا الموقع هو مساحتي لعرض مشاريعي ومشاركة رحلتي في عالم البرمجة.
        </p>
        <a href="#" class="btn">استكشف مشاريعي</a>
        <div class="links">
            <a href="#">📧 البريد الإلكتروني</a>
            <a href="#">💻 GitHub</a>
            <a href="#">📱 تواصل معي</a>
        </div>
    </div>
</body>
</html>
